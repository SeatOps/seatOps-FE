name: "✨ Feature Request Template"
description: "새로운 화면, 컴포넌트, 기능 추가 또는 UI/UX 개선 요청 시 생성하는 이슈입니다."
title: "[Feature] "
labels: ["feature"]
assignees: []

body:
  - type: textarea
    id: description
    attributes:
      label: "📌 기능 설명 (Description)"
      description: "추가하려는 기능의 목적과 배경을 설명해주세요."
      placeholder: "예) 사용자가 PT 강습을 검색하고 필터링할 수 있는 기능이 필요합니다."
    validations:
      required: true

  - type: textarea
    id: feature-details
    attributes:
      label: "✨ 상세 기능 내용 (Details)"
      description: "구현해야 하는 화면, 컴포넌트, 상태 변화, API 연동 등을 구체적으로 작성해주세요."
      placeholder: |
        - PT 목록 조회 API 연동
        - 검색어 입력 컴포넌트 추가
        - 카테고리 필터 UI 구현
        - 검색 결과 리스트 렌더링
        - 로딩 및 에러 상태 처리
    validations:
      required: true

  - type: textarea
    id: ui-design
    attributes:
      label: "🎨 UI / 디자인 참고"
      description: "피그마 링크, 화면 설계서, 디자인 시안 등을 첨부해주세요."
      placeholder: |
        Figma:
        화면 설계서:
        참고 서비스:

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "✅ 완료 조건 (Acceptance Criteria)"
      description: "기능이 완료되었다고 판단할 수 있는 기준을 작성해주세요."
      value: |
        - [ ] 화면이 정상적으로 렌더링된다.
        - [ ] API 데이터가 정상적으로 표시된다.
        - [ ] 예외 상황(빈 데이터, 에러)에 대응한다.
        - [ ] 반응형 UI가 적용된다.
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: "📋 작업 내용 (To-Do)"
      description: "구현을 위해 필요한 세부 작업 목록을 작성해주세요."
      value: |
        - [ ] UI 구현
        - [ ] API 연동
        - [ ] 타입 정의
        - [ ] 상태 관리
        - [ ] 예외 처리
        - [ ] 테스트
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "📎 참고 사항 (References)"
      description: "관련 이슈, PR, 기획서, 피그마 링크 등을 작성해주세요."
      placeholder: |
        Related Issue:
        Related PR:
        Figma:
        Notion: