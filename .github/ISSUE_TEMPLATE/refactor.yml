name: "🛠️ Refactor Template"
description: "코드 구조 개선, 성능 최적화, 기술 부채 해소를 위한 리팩토링 작업 시 생성하는 이슈입니다."
title: "[Refactor] "
labels: ["refactor"]
assignees: []
body:
  - type: textarea
    id: target
    attributes:
      label: "🔧 리팩토링 대상 및 내용"
      description: "어떤 컴포넌트, 페이지, 훅, API 계층 또는 상태 관리 로직을 개선하려는지 작성해주세요."
      placeholder: "예) PtFind 페이지의 API 호출 로직을 Custom Hook으로 분리하고 상태 관리 구조 개선"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: "📌 리팩토링 목적 및 배경 (AS-IS vs TO-BE)"
      description: "현재 구조의 문제점과 개선 후 기대 효과를 설명해주세요."
      placeholder: |
        AS-IS
        - API 호출, 상태 관리, UI 로직이 하나의 컴포넌트에 집중되어 있음
        - 컴포넌트 길이가 길고 재사용이 어려움

        ```
        TO-BE
        - Custom Hook으로 비즈니스 로직 분리
        - UI 컴포넌트 책임 분리
        - 유지보수성 및 재사용성 향상
        ```
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "📂 리팩토링 유형"
      options:
        - Component Structure
        - Custom Hook
        - API Layer
        - State Management
        - TypeScript Types
        - Performance Optimization
        - Folder Structure
        - Rendering Strategy (SSR/SSG/ISR/CSR)
        - Accessibility
        - UI/UX Improvement
        - Other
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "📋 세부 작업 내용 (To-Do)"
      description: "진행할 구체적인 작업 목록을 체크리스트로 작성해주세요."
      value: |
        - [ ] 컴포넌트 분리
        - [ ] 타입 정의 개선
        - [ ] API 로직 분리
        - [ ] 상태 관리 개선
        - [ ] 테스트 수행

        ````
        ---

        💻 Before

        ```tsx
        // 기존 코드
        ```

        ---

        ✨ After

        ```tsx
        // 리팩토링 후 코드
        ```
        ````

    validations:
      required: true

  - type: checkboxes
    id: dod
    attributes:
      label: "✅ 필수 점검 사항 (Definition of Done)"
      description: "리팩토링 완료 전 반드시 확인해야 하는 항목입니다."
      options:
        - label: "기존 기능이 동일하게 동작하는 것을 확인했습니다."
          required: true
        - label: "중복 코드를 제거하고 가독성을 향상시켰습니다."
          required: false
        - label: "TypeScript 타입 안정성을 개선했습니다."
          required: false
        - label: "불필요한 렌더링 또는 성능 저하 요소를 제거했습니다."
          required: false
        - label: "관련 문서 및 주석을 최신 상태로 반영했습니다."
          required: false

  - type: textarea
    id: metrics
    attributes:
      label: "📈 기대 효과"
      description: "리팩토링을 통해 얻고자 하는 효과를 작성해주세요."
      placeholder: |
        - 컴포넌트 재사용성 향상
        - 유지보수 비용 감소
        - 번들 크기 감소
        - 렌더링 성능 개선
        - 타입 안정성 향상

  - type: textarea
    id: references
    attributes:
      label: "📎 참고 사항 및 관련 이슈"
      description: "관련 이슈, PR, 기술 문서 등을 첨부해주세요."
      placeholder: |
        Related Issue: #12
        Related PR: #34
        Reference: https://nextjs.org/docs